<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="stylesheet" href="/part4/styles.css">
</head>
<body>
    <main>
        <div id="place-info-small" class="place-info-small">
            <!-- Place info will be loaded here-->
        </div>

        <section class="add-review">
            <div class="form" id="review-form-template">
                <h2>Add a Review</h2>

                <p id="review-error" style="color:#b00020; display:none;"></p>

                <form id="review-form">
                    <div class="form-group">
                        <label for="review-text">Your Review:</label>
                        <textarea id="review-text" name="review-text" rows="4" maxlength="1000" required
                                  placeholder="Share your experience at this place..."></textarea>
                        <small class="char-count" id="char-count">0/1000 characters</small>
                    </div>

                    <div class="form-group">
                        <label for="rating">Rating:</label>
                        <select id="rating" name="rating" required>
                            <option value="">Select a rating</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>

                    <button type="submit" id="submit-review">Submit Review</button>
                </form>

                <div class="form-actions">
                    <button type="button" onclick="history.back()" class="secondary-button">
                        Back to Place
                    </button>
                </div>
            </div>
        </section>
    </main>
    <script src="/part4/scripts/add_review.js"></script>
</body>
</html>
