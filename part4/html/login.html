<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

                            </svg>

                        </div>
                    </div>
                </div>

                <!-- Sign in section -->
                <div id="login-section">
                    <!-- Tagline -->
                    <p class="tagline">
                        Welcome to Lula, a home away from home.
                        <br>
                        Relax on a well deserved vacation.
                    </p>

                    <!-- Error -->
                    <div class="error-msg" id="errorMsg">Incorrect email or password. Please try again.</div>

                    <form id="login-form">
                        <!-- Email -->
                        <div class="field">
                            <label for="email" class="field-label">Email <span class="required">*</span></label>
                            <input type="email" id="email" placeholder="Enter email address" name="email" required />
                        </div>

                        <!-- Password -->
                        <div class="field">
                            <label for="password" class="field-label">Password <span class="required">*</span></label>
                            <input type="password" id="password" placeholder="Password" name="password" />
                        </div>

                        <!-- Forgot -->
                        <div class="forgot-row">
                            <a id="goToSignup">New user? <span>Sign up</span></a>
                        </div>

                        <!-- Submit -->
                        <button class="btn-submit" id="submitBtn" type="submit">
                            <span class="btn-text">Login</span>
                        </button>
                    </form>
                </div>

                <!-- Sign up section -->
                <div id="signup-section" style="display: none;">

                    <p class="tagline">
                        Join LULA and start your getaway.

                    </p>


                    <p class="signup-heading">Create your account</p>

                    <!-- <div class="error-msg" id="signupError"></div>
                    <div class="success-msg" id="signupSuccess">Account created! Redirecting to login…</div> -->

                    <form id="signup-form">
                        <div class="field-row">
                            <div class="field">
                                <label for="firstName" class="field-label">First name <span
                                        class="required">*</span></label>
                                <input type="text" id="firstName" placeholder="Enter first name" name="firstName"
                                    required />
                            </div>
                            <div class="field">
                                <label for="lastName" class="field-label">Last name <span
                                        class="required">*</span></label>
                                <input type="text" id="lastName" placeholder="Enter last name" name="lastName"
                                    required />
                            </div>
                        </div>

                        <div class="field">
                            <label for="signupEmail" class="field-label">Email <span class="required">*</span></label>
                            <input type="email" id="signupEmail" placeholder="Enter email address" name="signupEmail"
                                required />
                        </div>

                        <div class="field">
                            <label for="signupPassword" class="field-label">Password <span
                                    class="required">*</span></label>
                            <input type="password" id="signupEmail" placeholder="Create a password"
                                name="signupPassword" required />
                        </div>

                        <!-- Forgot -->
                        <div class="forgot-row">
                            <a id="goToLogin">Already a user? <span>Sign in </span></a>
                        </div>
                        <button class="btn-submit" type="submit">Sign Up</button>
                    </form>
                </div>


            </div>
        </div>
    </main>
    <script src="/part4/scripts/login.js"></script>
        <!-- Alert -->
        <div id="toast" class="toast" role="alert">
            <span id="toast-icon"></span>
            <span id="toast-message"></span>
        </div>
</body>

</html>
