<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
        <link rel="stylesheet" href="/part4/styles.css">
</head>
<body>
        <header>
        
        <nav>
            <a href="index.html" id="index-link" class="index-button"><img src="/part4/images/logo.png" class="logo"></a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <button id="logout-btn" class="login-button" type="button" style="display: none;">Logout</button>
        </nav>
    </header>
    <main>
         <section id="edit-place-section" class="add-review" style="display: none;">
            <div class="form">
                <h2>Edit Listing</h2>
                <p id="edit-place-msg"></p>
                <form id="edit-place-form">
                    <input id="edit-place-title" type="text" placeholder="Title" required>
                    <textarea id="edit-place-description" placeholder="Description"></textarea>
                    <input id="edit-place-price" type="number" min="0" step="0.01" placeholder="Price per night" required>
                    <input id="edit-place-latitude" type="number" step="any" placeholder="Latitude" required>
                    <input id="edit-place-longitude" type="number" step="any" placeholder="Longitude" required>
                    <button type="submit">Save Changes</button>
                </form>
            </div>
        </section>
        <section id="place-details" class="place-details">
            <div class="place-info">
                    <div class="place-header">
                        <h1 id="place-details-title"></h1>
                        <div class="place-actions">
                            <button id="edit-place-btn" type="button" class="secondary-button" style="display: none;">
                                Edit Listing
                            </button>
                            <button id="delete-place-btn" type="button" class="secondary-button" style="display: none;">
                                Delete Listing
                            </button>
                        </div>
                    </div>
                    <div class="place-details-image">
                        <img src="" alt="Place image">
                    </div>
                            <div class="place-details-host">
                                <h3>Host:</h3>
                            <div id="place-details-host-info"></div>
                        </div>
                    <div class="place-details-price" id="place-details-price"></div>
                    <div class="place-details-description" id="place-details-description"></div>
                    <div class="place-details-amenities">
                        <h3>Amenities</h3>
                        <ul id="place-details-amenities-list">
                            <li></li>
                            <li></li>
                            <li></li>
                        </ul>
                    </div>
                </div>
        </section>

        <section id="place-details-reviews">
            <h2>Reviews</h2>
            <div id="place-details-reviews-content">
                <div id="place-details-reviews-list">
                    <!-- Review 1 -->
                    <div class="review-card">
                        <div class="review-header">
                            <div class="review-author"></div>
                            <div class="review-rating"></div>
                        </div>
                        <div class="review-text"></div>
                    </div>
                    
                    
                </div>
                <div id="place-details-no-reviews" class="place-details-no-reviews" style="display: none;">
                    <p>No reviews yet. Be the first to review this place!</p>
                </div>
            </div>
        </section>

        <section id="add-review" class="add-review">
            <div id="login-prompt" style="display: none;">
                <p>Please <a href="login.html">log in</a> to leave a review.</p>
                <button id="add-review-button" type="button">
                    Add Review
                </button>
            </div>

            <!-- Redirect button (authenticated users) -->
            <div id="show-form-section">
                <button id="show-review-form-btn" type="button">
                    Add a Review
                </button>
            </div>
            
        </section>

       
    </main>
    <footer>
        <img src="/part4/images/logo_text_cream.png" id="footer-logo">
        <i>2026. All rights reserved. LULA was created by Liani, Uliana, Lachie and Anthonia.</i>
    </footer>
    <script src="/part4/scripts/place.js"></script>
</body>
</html>
